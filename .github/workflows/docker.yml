name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Serialize runs that share a commit (e.g. main-push and tag-push for the
# same SHA when releasing). Letting them queue means the second run can
# retag the image the first run produced instead of rebuilding identical
# code from scratch.
concurrency:
  group: docker-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          # git describe needs the full tag history; default shallow clone hides
          # tags and breaks the dev-version computation below.
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On main pushes, derive a semver-prerelease tag from the last v* tag so
      # every main commit gets a versioned image (e.g. v0.5.1 + 3 commits →
      # 0.5.1-dev.3.abc1234). Tag pushes skip this — the type=semver tags below
      # cover the release case.
      - name: Compute dev version
        id: dev_version
        if: github.ref == 'refs/heads/main'
        run: |
          desc=$(git describe --tags --long --match 'v*' 2>/dev/null || echo "")
          if [ -z "$desc" ]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          count=$(echo "$desc" | sed -E 's/^v[0-9]+\.[0-9]+\.[0-9]+-([0-9]+)-g[0-9a-f]+$/\1/')
          # main HEAD == a release tag: tag-push workflow already covers it.
          if [ "$count" = "0" ]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          version=$(echo "$desc" | sed -E 's/^v([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([0-9a-f]+)$/\1-dev.\2.\3/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            # latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # versioned dev tag for every main commit: 0.5.1-dev.3.abc1234
            type=raw,value=${{ steps.dev_version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' && steps.dev_version.outputs.version != '' }}
            # full semver on tags: v1.2.3 → 1.2.3
            type=semver,pattern={{version}}
            # major.minor shorthand: v1.2.3 → 1.2
            type=semver,pattern={{major}}.{{minor}}
            # short SHA for traceability
            type=sha

      # Probe whether an image for this commit already exists in the registry
      # (almost always: a main-push run that just finished). If so we skip the
      # rebuild and only attach the new ref's tags. PRs and the very first
      # build of a SHA fall through to the full build step.
      - name: Check for existing image
        id: probe
        if: github.event_name != 'pull_request'
        run: |
          short=$(echo "${{ github.sha }}" | cut -c1-7)
          src="ghcr.io/${{ github.repository }}:sha-$short"
          if docker buildx imagetools inspect "$src" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "src=$src" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        if: steps.probe.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Server-side retag: copies no layers, just creates new tag pointers
      # to the existing manifest. Multi-arch indexes are preserved.
      - name: Retag existing image
        if: steps.probe.outputs.exists == 'true'
        env:
          SRC: ${{ steps.probe.outputs.src }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "retag: $tag <- $SRC"
            docker buildx imagetools create -t "$tag" "$SRC"
          done <<< "$TAGS"
